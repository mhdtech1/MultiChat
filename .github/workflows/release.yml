name: Build and Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64 + ARM64 auto installer)
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @chatrix/chat-core build

      - name: Build desktop app
        run: |
          pnpm --filter @chatrix/desktop build:renderer
          pnpm --filter @chatrix/desktop build:main

      - name: Build and package desktop app
        run: pnpm --filter @chatrix/desktop package:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-windows
          if-no-files-found: error
          path: |
            apps/desktop/dist/Chatrix-win*.exe
            apps/desktop/dist/*.nsis.7z
            apps/desktop/dist/latest*.yml
            apps/desktop/dist/stable*.yml

  build-macos-universal:
    name: Build macOS (Universal)
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @chatrix/chat-core build

      - name: Build desktop app
        run: |
          pnpm --filter @chatrix/desktop build:renderer
          pnpm --filter @chatrix/desktop build:main

      - name: Build and package desktop app
        run: pnpm --filter @chatrix/desktop package:mac:universal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-macos-universal
          if-no-files-found: error
          path: |
            apps/desktop/dist/Chatrix-mac*.dmg
            apps/desktop/dist/Chatrix-mac*.zip
            apps/desktop/dist/latest-mac*.yml
            apps/desktop/dist/stable-mac*.yml

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @chatrix/chat-core build

      - name: Build desktop app
        run: |
          pnpm --filter @chatrix/desktop build:renderer
          pnpm --filter @chatrix/desktop build:main

      - name: Build and package desktop app
        run: pnpm --filter @chatrix/desktop package:linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-linux
          if-no-files-found: error
          path: |
            apps/desktop/dist/Chatrix-linux-*.AppImage
            apps/desktop/dist/Chatrix-linux-*.deb
            apps/desktop/dist/latest-linux*.yml

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-universal
      - build-linux
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
