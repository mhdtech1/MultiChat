name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @multichat/chat-core build

      - name: Build desktop app
        run: |
          pnpm --filter @multichat/desktop build:renderer
          pnpm --filter @multichat/desktop build:main

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Run tests
        run: pnpm test
